name: Test, Push to Docker Hub and Deploy to AWS
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/fibonacci/**'
      - .github/workflows/aws-deploy.yml
  push:
    branches:
      - main
    paths:
      - 'apps/fibonacci/**'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v3
      - name: Build Docker Image
        run: |
          cd apps/fibonacci
          docker build -f ./client/Dockerfile.dev -t fib-test ./client/
      - name: Run Tests
        run: docker run -e CI=true fib-test npm run test
  push_docker_hub:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout the code
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
      - name: Build and Push Docker Image
        run: |
          cd apps/fibonacci
          docker build -f ./client/Dockerfile -t ${{ secrets.DOCKER_HUB_USERNAME }}/fib-client ./client/
          docker build -f ./server/Dockerfile -t ${{ secrets.DOCKER_HUB_USERNAME }}/fib-server ./server/
          docker build -f ./worker/Dockerfile -t ${{ secrets.DOCKER_HUB_USERNAME }}/fib-worker ./worker/
          docker build -f ./gateway/Dockerfile -t ${{ secrets.DOCKER_HUB_USERNAME }}/fib-gateway ./gateway/
