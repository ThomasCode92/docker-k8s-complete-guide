services:
  postgres:
    image: 'postgres:latest'
    environment:
      - POSTGRES_PASSWORD=postgres_password
  redis:
    image: 'redis:latest'
  server:
    build:
      dockerfile: Dockerfile.dev
      context: ./server
    env_file:
      - ./env/.server.env
    volumes:
      - /usr/app/node_modules
      - ./server:/usr/app
